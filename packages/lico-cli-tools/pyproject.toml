[project]
name = "lico-cli-tools"
version = "0.1.0"
description = "CLI utility tools for Lico (e.g., JSON to JSONL conversion)"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[project.scripts]
lico-jsonl-converter = "lico_cli_tools.json_converter:main"
lico-jsonl-filter = "lico_cli_tools.json_filter:main"
lico-jsonl-pack = "lico_cli_tools.json_pack:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lico_cli_tools"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
