services:
  lico-resident:
    build:
      context: ../../..
      dockerfile: packages/lico-devc/.devcontainer/Dockerfile
    volumes:
      - ${LICO_HUB_ROOT}:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      # Performance Optimization: Shadow high-I/O directories with native volumes
      - venv-cache:/workspace/${LICO_ACTIVE_REL}/.venv
      - node-modules-cache:/workspace/${LICO_ACTIVE_REL}/node_modules
      - temp-cache:/workspace/${LICO_ACTIVE_REL}/.temp
      # SSH Passport: Keep host keys persistent across rebuilds
      - ssh-keys:/etc/ssh
    environment:
      - LICO_ACTIVE_REL=${LICO_ACTIVE_REL}
    ports:
      - "2222:22"
    stdin_open: true
    tty: true

volumes:
  venv-cache:
  node-modules-cache:
  temp-cache:
  ssh-keys:
