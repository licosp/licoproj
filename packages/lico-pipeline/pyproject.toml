[project]
name = "lico-pipeline"
version = "0.1.0"
description = "Orchestrator for Lico's linting and testing pipelines"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[project.scripts]
lico-pipeline = "lico_pipeline.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lico_pipeline"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
