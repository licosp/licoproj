[project]
name = "licoproj"
version = "0.0.1"
requires-python = ">=3.14"
dependencies = []

[dependency-groups]
lico-lint = ["lico-lint"]
lico-devc = ["lico-devc"]
lico-lint-empty-dir = ["lico-lint-empty-dir"]

dev = [
  "mypy>=1.19.1",
  "pyright>=1.1.408",
  "pytest>=9.0.2",
  "pyyaml>=6.0.3",
  "ruff>=0.15.1",
  "types-pyyaml>=6.0.12.20250915",
]

[project.optional-dependencies]
lico-lint = ["lico-lint"]
lico-devc = ["lico-devc"]
lico-lint-empty-dir = ["lico-lint-empty-dir"]

[tool.uv]
cache-dir = "./.temp/cache/uv"
default-groups = ["dev", "lico-lint", "lico-devc", "lico-lint-empty-dir"]

[tool.uv.sources]
lico-lint = { workspace = true }
lico-devc = { workspace = true }
lico-lint-empty-dir = { workspace = true }

[tool.uv.workspace]
members = [
  "packages/lico-lint",
  "packages/lico-lint-empty-dir",
  "packages/lico-devc",
]

[tool.ruff]
cache-dir = "./.temp/cache/ruff"
exclude = ["**/.temp/**", "**/.venv/**", "**/node_modules/**", "**/.trash/**"]
line-length = 79
respect-gitignore = true
target-version = "py315"

[tool.ruff.format]
docstring-code-format = true
line-ending = "lf"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "CPY001",
  "D203",
  "D213",
  "COM812",
  "ISC001",
  "S404",
  "S603",
  "S606",
  "S607",
]
preview = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 5

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.14"
pythonPlatform = "Linux"
exclude = [
  "**/.venv",
  "**/.temp",
  "**/.trash",
  "**/node_modules",
  "**/__pycache__",
]
include = ["."]
extraPaths = [
  "packages/lico-lint/src",
  "packages/lico-lint-empty-dir/src",
  "packages/lico-devc/src",
]
reportUnknownVariableType = "error"
reportUnknownMemberType = "error"
reportUnknownParameterType = "error"
reportUnknownArgumentType = "error"
reportUnknownLambdaType = "error"
reportUnusedImport = "error"
reportUnusedVariable = "error"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportMissingTypeStubs = true
reportUntypedFunctionDecorator = true
reportPrivateUsage = "error"
reportTypeCommentUsage = "error"
reportImplicitStringConcatenation = "error"

[tool.mypy]
strict = true
pretty = true
disallow_any_decorated = true
disallow_any_explicit = true
disallow_any_expr = true
implicit_optional = true
ignore_missing_imports = false
disallow_any_unimported = true
show_error_codes = true
warn_unreachable = true
cache_dir = "./.temp/cache/mypy"
mypy_path = [
  "packages/lico-lint",
  "packages/lico-lint-empty-dir",
  "packages/lico-devc",
]

[[tool.mypy.overrides]]
module = ["lico-lint", "lico-lint-empty-dir", "lico-devc"]
disable_error_code = ["misc"]

[tool.pytest.ini_options]
addopts = """
  --capture=no
  --exitfirst
  --last-failed
  --new-first
  --verbose
"""
cache_dir = "./.temp/cache/pytest"
pythonpath = [
  "packages/lico-lint",
  "packages/lico-lint-empty-dir",
  "packages/lico-devc",
]
testpaths = [
  "packages/lico-lint/tests",
  "packages/lico-lint-empty-dir/tests",
  "packages/lico-devc/tests",
]
