[project]
name = "licoproj"
version = "0.0.1"
requires-python = ">=3.14"
dependencies = [
    "lico-lint-empty-dir",
]

[dependency-groups]
lico-lint = ["lico-lint"]
licoproj-devc = ["licoproj-devc"]

dev = [
  "mypy>=1.19.1",
  "pyright>=1.1.408",
  "pytest>=9.0.2",
  "pyyaml>=6.0.3",
  "ruff>=0.15.1",
  "types-pyyaml>=6.0.12.20250915",
]

[project.optional-dependencies]
lico-lint = ["lico-lint"]
licoproj-devc = ["licoproj-devc"]

[tool.uv]
default-groups = ["dev", "lico-lint", "licoproj-devc"]

[tool.uv.sources]
lico-lint = { workspace = true }
licoproj-devc = { workspace = true }
lico-lint-empty-dir = { workspace = true }

[tool.uv.workspace]
members = ["packages/lico-lint", "packages/lico-lint-empty-dir", "packages/licoproj-devc"]

[tool.ruff]
cache-dir = "./.temp/cache/ruff"
exclude = [
  "**/.temp/**",
  "**/.venv/**",
  "**/node_modules/**",
  "**/.repos/**",
  "**/.trash/**",
  "**/.agent/.internal/archive/**",
]
line-length = 79
respect-gitignore = true
target-version = "py315"

[tool.ruff.format]
docstring-code-format = true
line-ending = "lf"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "CPY001",
  "D203",
  "D213",
  "COM812",
  "ISC001",
  "S404",
  "S603",
  "S606",
  "S607",
]
preview = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 5

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.14"
pythonPlatform = "Linux"
exclude = [
  "**/.*",
  "**/node_modules",
  "**/__pycache__",
  ".venv",
  ".temp",
  ".repos",
  ".trash",
  ".agent/.internal/archive",
]
include = ["packages/lico-lint/src", "packages/licoproj-devc/src"]
extraPaths = ["packages/lico-lint/src", "packages/licoproj-devc/src"]
reportUnknownVariableType = true
reportUnknownMemberType = true
reportUnknownParameterType = true
reportUnknownArgumentType = true
reportUnknownLambdaType = true
reportUnusedImport = "error"
reportUnusedVariable = "error"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportMissingTypeStubs = true
reportUntypedFunctionDecorator = true
reportPrivateUsage = "error"
reportTypeCommentUsage = "error"
reportImplicitStringConcatenation = "error"

[tool.mypy]
strict = true
pretty = true
disallow_any_decorated = true
disallow_any_explicit = true
disallow_any_expr = true
implicit_optional = true
ignore_missing_imports = false
disallow_any_unimported = true
show_error_codes = true
warn_unreachable = true
cache_dir = "./.temp/cache/mypy"
mypy_path = ["packages/lico-lint", "packages/licoproj-devc"]

[[tool.mypy.overrides]]
module = ["lico-lint", "licoproj-devc"]
disable_error_code = ["misc"]

[tool.pytest.ini_options]
addopts = """
  --capture=no
  --exitfirst
  --last-failed
  --new-first
  --verbose
"""
cache_dir = "./.temp/cache/pytest"
pythonpath = ["packages/lico-lint", "packages/licoproj-devc"]
testpaths = ["packages/lico-lint/tests"]
